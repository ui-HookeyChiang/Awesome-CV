<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hookey Chiang - Interview Presentation</title>
    <noscript><style>.slide,.sar-item,.point-card,.metric-box,.flow-box,.achievement-chip{opacity:1!important;transform:none!important;}</style></noscript>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <style>
        :root {
            --page-bg: #0c0c18;
            --slide-bg: #141424;
            --card-bg: #242440;
            --text-primary: #F4F4F8;
            --text-secondary: #D0D0DA;
            --text-muted: #7a7a90;
            --primary: #4B8BFF;
            --success: #34D399;
            --accent: #67E8F9;
            --orange: #FBBF24;
            --alert: #F87171;
            --border: #333350;
            --code-bg: #0a0a16;
            --code-text: #34D399;
            /* display and body share the same stack now; kept separate for future differentiation */
            --font-display: 'Avenir Next', Calibri, sans-serif;
            --font-body: 'Avenir Next', Calibri, sans-serif;
            --font-mono: 'JetBrains Mono', Consolas, 'Courier New', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            line-height: 1.6;
            color: var(--text-secondary);
            background: var(--page-bg);
            overflow-x: hidden;
        }

        .presentation {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .slide {
            background:
                radial-gradient(ellipse 80% 60% at 10% 0%, rgba(75,139,255,0.04) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 100%, rgba(52,211,153,0.03) 0%, transparent 60%),
                var(--slide-bg);
            border-radius: 14px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 6px 30px rgba(0,0,0,0.5);
            min-height: 80vh;
            width: 100%;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            page-break-after: always;
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            /* Entrance animation */
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .slide.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Fallback: if JS fails or is blocked, show all slides immediately */
        .slide.no-js-fallback {
            opacity: 1;
            transform: none;
        }

        .slide.visible .sar-item,
        .slide.visible .point-card,
        .slide.visible .metric-box,
        .slide.visible .flow-box {
            opacity: 1;
            transform: translateY(0);
        }

        .sar-item,
        .point-card,
        .metric-box,
        .flow-box {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* Stagger child animations */
        .slide.visible .sar-item:nth-child(1),
        .slide.visible .point-card:nth-child(1),
        .slide.visible .metric-box:nth-child(1),
        .slide.visible .flow-box:nth-child(1) { transition-delay: 0.1s; }
        .slide.visible .sar-item:nth-child(2),
        .slide.visible .point-card:nth-child(2),
        .slide.visible .metric-box:nth-child(2),
        .slide.visible .flow-box:nth-child(2) { transition-delay: 0.2s; }
        .slide.visible .sar-item:nth-child(3),
        .slide.visible .point-card:nth-child(3),
        .slide.visible .metric-box:nth-child(3),
        .slide.visible .flow-box:nth-child(3) { transition-delay: 0.3s; }


        .slide h1 {
            font-family: var(--font-display);
            color: var(--text-primary);
            font-size: 2.2rem;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.01em;
            position: relative;
        }

        .slide h1::after {
            content: '';
            display: block;
            width: 35%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            margin-top: 10px;
            border-radius: 2px;
        }

        .slide h2 {
            font-family: var(--font-display);
            color: var(--text-primary);
            font-size: 1.8rem;
            margin-bottom: 20px;
            margin-top: 30px;
            font-weight: 600;
        }

        .slide h3 {
            font-family: var(--font-display);
            color: var(--text-primary);
            font-size: 1.3rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Ensure consistent content width */
        .slide > * {
            max-width: 100%;
            box-sizing: border-box;
        }

        /* Flow diagram system */
        .flow-box {
            width: 200px;
            min-height: 100px;
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-size: 0.8rem;
            font-weight: 600;
            line-height: 1.3;
            box-shadow: none;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .flow-box--lg {
            width: 220px;
        }

        .flow-box__title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .flow-box__subtitle {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .flow-box__desc {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .flow-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .flow-row--mb {
            margin-bottom: 30px;
        }

        .flow-step {
            text-align: center;
        }

        .flow-arrow {
            font-size: 1.6rem;
            color: var(--text-muted);
            margin: 0 5px;
        }

        .flow-arrow-down {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .flow-arrow-down::after {
            content: '\2193';
            font-size: 1.6rem;
            color: var(--primary);
            font-weight: 700;
        }

        .text-accent {
            color: var(--accent);
            font-weight: 700;
        }

        .sar-text {
            margin: 10px 0;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .flow-caption {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .flow-box:hover {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0,111,255,0.15);
        }

        .flow-box:focus-visible {
            outline: 3px solid var(--primary);
            outline-offset: 2px;
        }

        /* Cheat sheet modal */
        .cheat-sheet-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .cheat-sheet-content {
            position: relative;
            background: var(--slide-bg);
            border: 1px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 14px;
            padding: 30px;
            width: calc(100% - 40px);
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cheat-sheet-header {
            font-family: var(--font-display);
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .cheat-sheet-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .cheat-sheet-close:hover {
            color: var(--alert);
        }

        .cheat-sheet-item {
            margin-bottom: 15px;
            padding: 12px;
            background: var(--card-bg);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            color: var(--text-secondary);
        }

        .cheat-sheet-item strong {
            color: var(--text-primary);
        }

        .cheat-sheet-item p {
            color: var(--text-secondary);
        }

        .cheat-sheet-command {
            font-family: var(--font-mono);
            background: var(--code-bg);
            color: var(--code-text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin: 8px 0;
            display: block;
        }

        .section-break {
            margin: 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .intro-header {
            text-align: left;
            margin-bottom: 30px;
        }

        .name {
            font-family: var(--font-display);
            font-size: 3.5rem;
            color: var(--text-primary);
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.05rem;
            padding: 10px 20px;
            background: transparent;
            border-radius: 25px;
            border: none;
            color: var(--text-muted);
        }

        .summary-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            margin: 30px 0;
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .summary-box h3 {
            color: var(--text-primary);
        }

        .achievements-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 20px;
        }

        .achievement-section h4 {
            font-family: var(--font-display);
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .achievement-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 30px;
            margin: 20px 0;
        }

        .achievement-chip {
            display: flex;
            align-items: baseline;
            gap: 8px;
            padding: 8px 0;
        }

        .achievement-chip .ach-title {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .achievement-chip .ach-stat {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .point-card {
            background: var(--card-bg);
            padding: 28px;
            border-radius: 10px;
            border: 2px solid var(--border);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .point-card:hover {
            border-color: var(--primary);
            box-shadow: inset 0 0 0 1px var(--primary), 0 4px 20px rgba(0, 111, 255, 0.15);
            cursor: pointer;
        }

        .point-card h4 {
            font-family: var(--font-display);
            color: var(--text-primary);
            margin-bottom: 10px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .metrics-row {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .metric-box {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 10px;
            border: 2px solid var(--border);
            text-align: center;
            min-width: 120px;
            box-shadow: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .metric-box:hover {
            border-color: var(--primary);
            box-shadow: inset 0 0 0 1px var(--primary), 0 4px 20px rgba(0, 111, 255, 0.15);
            cursor: pointer;
        }

        .metric-number {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            display: block;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .metric-label {
            font-family: var(--font-display);
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .metric-label strong {
            color: var(--text-muted);
        }

        /* Tech stack visualization */
        .tech-stack {
            display: flex;
            flex-direction: column;
            gap: 0;
            min-width: 200px;
            max-width: 240px;
        }

        .tech-stack-row {
            display: flex;
            gap: 6px;
        }

        .tech-layer {
            padding: 10px 16px;
            border: 1px solid rgba(0, 111, 255, 0.3);
            background: rgba(0, 111, 255, 0.08);
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 600;
            text-align: center;
            flex: 1;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }

        .tech-stack > .tech-layer:first-child {
            border-radius: 8px 8px 0 0;
        }

        .tech-stack > .tech-layer:last-child {
            border-radius: 0 0 8px 8px;
        }

        .tech-stack > .tech-stack-row:first-child .tech-layer:first-child {
            border-radius: 8px 0 0 0;
        }

        .tech-stack > .tech-stack-row:first-child .tech-layer:last-child {
            border-radius: 0 8px 0 0;
        }

        .tech-stack > .tech-stack-row:last-child .tech-layer:first-child {
            border-radius: 0 0 0 8px;
        }

        .tech-stack > .tech-stack-row:last-child .tech-layer:last-child {
            border-radius: 0 0 8px 0;
        }

        .tech-layer-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .tech-layer-dashed {
            border: 1px dashed var(--border);
            background: var(--card-bg);
            opacity: 0.55;
        }

        .sar-format {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin: 25px 0;
        }

        .sar-item {
            background: var(--slide-bg);
            padding: 20px;
            border-radius: 10px;
            border: none;
        }

        .sar-item strong {
            color: var(--text-primary);
            display: block;
            margin-bottom: 8px;
        }

        .sar-situation {
            grid-column: 1 / -1;
            border: none;
            border-left: 4px solid var(--alert);
            background: rgba(248,113,113,0.1);
            margin-top: 0;
        }

        .sar-action {
            grid-column: 1 / -1;
            border: none;
            border-left: 4px solid var(--primary);
            background: rgba(0, 111, 255, 0.05);
            margin-top: 0;
        }

        .sar-result {
            grid-column: 1 / -1;
            border: none;
            border-left: 4px solid var(--success);
            background: rgba(52,211,153,0.1);
            margin-top: 0;
        }

        .tech-skills {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 25px 0;
        }

        .tech-skill {
            background: rgba(0,111,255,0.15);
            color: var(--accent);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid rgba(0,111,255,0.25);
            box-shadow: none;
        }

        .closing-section {
            text-align: center;
            padding: 60px 0;
        }

        .closing-title {
            font-family: var(--font-display);
            font-size: 3.5rem;
            color: var(--text-primary);
            margin-bottom: 30px;
            font-weight: 700;
        }

        .closing-subtitle {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--text-muted);
            margin-bottom: 50px;
        }

        .slide-number {
            position: absolute;
            top: 20px;
            right: 30px;
            font-family: var(--font-display);
            background: transparent;
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 400;
        }

        .navigation-hint {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(26,26,46,0.95);
            color: var(--text-muted);
            padding: 12px 20px;
            border-radius: 25px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
            font-family: var(--font-display);
            z-index: 100;
        }

        ul {
            margin: 20px 0;
            padding-left: 20px;
        }

        li {
            margin-bottom: 12px;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        li strong {
            color: var(--text-primary);
        }

        /* SAR header styling */
        .sar-header-situation {
            font-family: var(--font-display);
            color: var(--alert);
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sar-header-situation::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--alert);
        }

        .sar-header-action {
            font-family: var(--font-display);
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sar-header-action::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }

        .sar-header-result {
            font-family: var(--font-display);
            color: var(--success);
            font-size: 1.1rem;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sar-header-result::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        @media (max-width: 768px) {
            .presentation {
                padding: 15px;
                max-width: 100%;
            }

            .slide {
                padding: 20px 15px;
                margin-bottom: 20px;
                min-height: auto;
                width: 100%;
                box-sizing: border-box;
                overflow-x: hidden;
            }

            /* All inner flex containers: allow wrapping */
            .slide div[style*="display: flex"] {
                flex-wrap: wrap !important;
            }

            /* Bar chart containers: shrink to fit */
            .sar-situation div[style*="width: 50px"] {
                width: 35px !important;
            }

            .sar-situation div[style*="gap: 20px"][style*="padding: 0 20px"] {
                gap: 8px !important;
                padding: 0 5px !important;
            }

            .sar-situation div[style*="font-size: 0.75rem"] {
                font-size: 0.6rem !important;
                letter-spacing: 0.5px !important;
            }

            .name {
                font-size: 2.8rem;
            }

            .contact-info {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }

            .metrics-row {
                justify-content: center;
                flex-wrap: wrap;
            }

            /* Override inline flex: 0 0 75% on metrics containers */
            .slide > div[style*="display: flex"] > div[style*="flex: 0 0 75"] {
                flex: 1 1 100% !important;
            }

            .slide h1 {
                font-size: 2rem;
            }

            .sar-format {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .tech-stack {
                width: 100% !important;
                max-width: 100% !important;
                flex: 1 1 100% !important;
                margin-bottom: 20px;
            }

            .achievement-grid {
                grid-template-columns: 1fr;
            }

            .achievement-chip {
                flex-wrap: wrap;
            }

            .flow-row {
                flex-direction: column;
                align-items: center;
            }

            .flow-arrow {
                transform: rotate(90deg);
            }

            .flow-box {
                width: 100%;
                max-width: 280px;
            }

            /* Metric boxes: allow shrink and wrap */
            .metric-box {
                min-width: 80px !important;
                flex: 1 1 calc(50% - 15px) !important;
                max-width: calc(50% - 10px);
            }

            /* SAR result metrics: force wrap */
            .sar-result .metrics-row {
                flex-wrap: wrap !important;
            }

            .sar-result .metric-box {
                flex: 1 1 calc(50% - 15px) !important;
                min-width: 100px !important;
            }

            .metric-number {
                font-size: 1.8rem !important;
            }

            .metric-label {
                font-size: 0.65rem !important;
                letter-spacing: 1px !important;
            }

            /* Situation charts: constrain to viewport */
            .sar-situation div[style*="display: flex"][style*="align-items: end"] {
                overflow-x: auto !important;
                -webkit-overflow-scrolling: touch;
            }

            /* Summary strengths: stack vertically */
            .slide > div[style*="gap: 40px"][style*="font-size: 1.4rem"] {
                flex-direction: column !important;
                gap: 12px !important;
                font-size: 1.1rem !important;
                text-align: center;
            }

            /* Hide pipe separators on mobile */
            .slide > div[style*="gap: 40px"] > div[style*="font-size: 1.5rem"] {
                display: none !important;
            }

            /* Summary tagline */
            .slide h2[style*="font-size: 2.0rem"] {
                font-size: 1.4rem !important;
            }

            .cheat-sheet-content {
                width: calc(100% - 24px);
                padding: 20px;
            }
        }

        @media print {
            body { background: white; color: #1f2937; }
            .presentation {
                max-width: none;
                padding: 0;
            }
            .slide {
                box-shadow: none;
                border: 1px solid #e5e7eb;
                min-height: auto;
                width: 100%;
                margin-bottom: 20px;
                page-break-after: always;
                background: white;
                color: #1f2937;
                opacity: 1;
                transform: none;
            }
            .slide .sar-item,
            .slide .point-card,
            .slide .metric-box,
            .slide .flow-box {
                opacity: 1;
                transform: none;
            }
            .navigation-hint { display: none; }
        }

        @media (min-width: 1400px) {
            .presentation {
                max-width: 1300px;
            }
        }
    </style>
</head>
<body>
    <div class="navigation-hint">
        Use &#8592; &#8594; arrow keys to navigate slides
    </div>

    <div class="presentation">
        <!-- SLIDES -->
    </div>

    <!-- Cheat Sheet Modal -->
    <div id="cheatSheetModal" class="cheat-sheet-modal">
        <div class="cheat-sheet-content">
            <div class="cheat-sheet-close" onclick="closeCheatSheet()">&times;</div>
            <div class="cheat-sheet-header" id="cheatSheetTitle"></div>
            <div id="cheatSheetBody"></div>
        </div>
    </div>

    <script>
        // Safety net: if any JS error occurs, force all slides visible
        window.onerror = function() {
            document.querySelectorAll('.slide,.sar-item,.point-card,.metric-box,.flow-box,.achievement-chip').forEach(
                function(el) { el.style.opacity = '1'; el.style.transform = 'none'; }
            );
        };

        // Enhanced navigation and presentation features
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        // Cheat Sheet Data
        const cheatSheets = {
<!-- CHEAT_SHEETS -->
        };

        // Cheat Sheet Functions
        function showCheatSheet(cheatKey) {
            const cheatSheet = cheatSheets[cheatKey];
            if (cheatSheet) {
                document.getElementById('cheatSheetTitle').innerHTML = cheatSheet.title;
                document.getElementById('cheatSheetBody').innerHTML = cheatSheet.content;
                document.getElementById('cheatSheetModal').style.display = 'flex';

                // Prevent background scrolling
                document.body.style.overflow = 'hidden';
            }
        }

        function closeCheatSheet() {
            document.getElementById('cheatSheetModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside content
        document.getElementById('cheatSheetModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeCheatSheet();
            }
        });

        // Navigation functions
        function showSlide(n) {
            if (n >= 0 && n < totalSlides) {
                currentSlide = n;
                try {
                    slides[currentSlide].scrollIntoView({ behavior: 'smooth', block: 'start' });
                } catch(e) {
                    slides[currentSlide].scrollIntoView(true);
                }
            }
        }

        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                showSlide(currentSlide + 1);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                showSlide(currentSlide - 1);
            }
        }

        // Enhanced Keyboard navigation
        document.addEventListener('keydown', function(e) {
            // Check if modal is open first
            if (document.getElementById('cheatSheetModal').style.display === 'flex') {
                if (e.key === 'Escape') {
                    e.preventDefault();
                    closeCheatSheet();
                }
                return; // Don't process other keys when modal is open
            }

            switch(e.key) {
                case 'ArrowRight':
                case ' ':
                case 'PageDown':
                    e.preventDefault();
                    nextSlide();
                    break;
                case 'ArrowLeft':
                case 'PageUp':
                    e.preventDefault();
                    prevSlide();
                    break;
                case 'Home':
                    e.preventDefault();
                    showSlide(0);
                    break;
                case 'End':
                    e.preventDefault();
                    showSlide(totalSlides - 1);
                    break;
                case 'Escape':
                    // Toggle fullscreen (with Safari/iOS fallback)
                    try {
                        const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
                        if (!fsEl) {
                            const el = document.documentElement;
                            (el.requestFullscreen || el.webkitRequestFullscreen || function(){}).call(el);
                        } else {
                            (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
                        }
                    } catch(e) { /* fullscreen not supported (iOS) */ }
                    break;
            }
        });

        // Add click and keyboard handlers for flow boxes
        document.querySelectorAll('.flow-box').forEach(box => {
            box.addEventListener('click', function() {
                const cheatKey = this.getAttribute('data-cheat');
                if (cheatKey) {
                    showCheatSheet(cheatKey);
                }
            });
            box.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    const cheatKey = this.getAttribute('data-cheat');
                    if (cheatKey) showCheatSheet(cheatKey);
                }
            });
        });

        // Add click handlers for clickable metric boxes
        document.querySelectorAll('.metric-box[data-cheat]').forEach(box => {
            box.addEventListener('click', function() {
                const cheatKey = this.getAttribute('data-cheat');
                if (cheatKey) {
                    showCheatSheet(cheatKey);
                }
            });
        });

        // Presentation mode indicator
        function updateNavigationHint() {
            const hint = document.querySelector('.navigation-hint');
            hint.innerHTML = `
                Slide ${currentSlide + 1} of ${totalSlides} |
                Use \u2190 \u2192 arrow keys to navigate |
                Press ESC for fullscreen
            `;
        }

        // Initialize
        updateNavigationHint();

        // Update navigation hint and trigger entrance animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const slideIndex = Array.from(slides).indexOf(entry.target);
                    if (slideIndex !== -1) {
                        currentSlide = slideIndex;
                        updateNavigationHint();
                    }
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.15 });

        slides.forEach(slide => observer.observe(slide));

        console.log('Interview presentation loaded successfully!');
        console.log('Navigation: Use arrow keys only');
        console.log('Total slides:', totalSlides);
    </script>
</body>
</html>
