<!-- fragment: summary
     tags: [summary, strengths, metrics]
     type: slide
-->
        <div class="slide">
            <div class="slide-number">{{N}} / {{TOTAL}}</div>
            <h1>Summary</h1>

            <!-- Tagline -->
            <div style="text-align: center; margin: 40px 0;">
                <h2 style="font-family: var(--font-display); color: var(--primary); font-size: 2.0rem; font-weight: 600; line-height: 1.4;">
                    {{summary-tagline}}
                </h2>
            </div>

            <!-- Three Key Strengths -->
            <div style="display: flex; justify-content: center; align-items: center; gap: 40px; margin: 40px 0; font-family: var(--font-display); font-size: 1.4rem; font-weight: 600; color: var(--text-muted);">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span>{{strength-1}}</span>
                </div>
                <div style="color: var(--border); font-size: 1.5rem;">|</div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span>{{strength-2}}</span>
                </div>
                <div style="color: var(--border); font-size: 1.5rem;">|</div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span>{{strength-3}}</span>
                </div>
            </div>

            <!-- 3. Quantified Metrics -->
            <div class="metrics-row" style="margin-top: 40px;">
                <div class="metric-box">
                    <span class="metric-number">8</span>
                    <span class="metric-label">Years Linux Development</span>
                </div>
                <div class="metric-box">
                    <span class="metric-number">2M+</span>
                    <span class="metric-label">Users Served</span>
                </div>
                <div class="metric-box">
                    <span class="metric-number">180</span>
                    <span class="metric-label">Support Cases</span>
                </div>
                <div class="metric-box">
                    <span class="metric-number">6</span>
                    <span class="metric-label">Product Variants</span>
                </div>
            </div>
        </div>
